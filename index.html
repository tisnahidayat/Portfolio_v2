<!doctype html>
<html lang="id">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.webp" />
    <!-- preload Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />

    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      />
    </noscript>

    <!-- SEO Utama -->
    <title>Tisna Hidayat | Software Quality Assurance</title>
    <meta
      name="description"
      content="Website resmi Tisna Hidayat, Software Quality Assurance. Saya berfokus pada penciptaan pengalaman digital yang menarik dan selalu berupaya memberikan solusi terbaik dalam setiap proyek yang saya kerjakan."
    />
    <meta
      name="keywords"
      content="Tisna Hidayat, Software Quality Assurance, Portofolio Tisna"
    />
    <meta name="author" content="Tisna Hidayat" />

    <!-- Google Search Console -->

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#030014" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Tisna Hidayat | Software Quality Assurance"
    />
    <meta
      property="og:description"
      content="Website resmi dan portofolio Tisna Hidayat, Software Quality Assurance."
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Tisna Hidayat | Software Quality Assurance"
    />
    <meta
      name="twitter:description"
      content="Website resmi dan portofolio Tisna Hidayat."
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://tisna-hidayat.vercel.app/" />

    <!-- Structured Data: Person -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Tisna Hidayat",
        "url": "https://tisna-hidayat.vercel.app",
        "jobTitle": "Quality Assurance Engineer",
        "description": "Saya berfokus pada penciptaan pengalaman digital yang menarik dan selalu berupaya memberikan solusi terbaik dalam setiap proyek yang saya kerjakan.",
        "sameAs": [
          "https://www.linkedin.com/in/tisna-hidayat-778084203/",
          "https://www.instagram.com/tisnahidayat_/",
          "https://github.com/tisnahidayat",
          "https://www.tiktok.com/@sudahmakanteruspulang_"
        ]
      }
    </script>
  </head>

  <body>
    <!-- Konten teks penting untuk SEO -->
    <header style="display: none">
      <h1>Tisna Hidayat</h1>
      <p>
        Saya berfokus pada penciptaan pengalaman digital yang menarik dan selalu
        berupaya memberikan solusi terbaik dalam setiap proyek yang saya
        kerjakan.
      </p>
    </header>

    <!-- Root React -->
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
